name: Arena

# ローカルマシンを熱くせずに戦略同士のアリーナ対局をGitHub Actions上で実行する。
# 手動起動のみ（push/PRトリガーなし）。引数はCLAUDE.mdの `cargo run --release --bin arena` と同じ体系。
# 基準ごとに matrix で別ジョブに分割する（時計が1000秒+3秒になりジョブの
# 6時間制限に収まらないため。分割により壁時計も最長カード分に縮む）。
on:
  workflow_dispatch:
    inputs:
      games:
        description: "対局数（基準ごと）"
        required: false
        default: "100"
      candidate:
        description: "候補戦略"
        required: false
        default: "estimator"
      baselines:
        description: "基準戦略（スペース区切り。複数でガントレット）"
        required: false
        default: "estimator_v2 estimator_v3 estimator_v4 estimator_v5"
      match_seed:
        description: "共通seed（アブレーション比較用。空なら毎局ランダム）"
        required: false
        default: ""

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      baselines: ${{ steps.split.outputs.list }}
    steps:
      - id: split
        run: echo "list=$(echo '${{ inputs.baselines }}' | jq -R -c 'split(" ") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  arena:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        baseline: ${{ fromJSON(needs.plan.outputs.baselines) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run arena
        env:
          # 候補(A)視点の対局記録。bin/analyze での敗着分析用に artifact で回収する
          ARENA_RECORD_DIR: arena-records
          # 空なら毎局ランダム。指定するとアブレーション比較用に対局条件が決定論化される
          ARENA_MATCH_SEED: ${{ inputs.match_seed }}
        run: |
          cargo run --release --bin arena -- \
            "${{ inputs.games }}" \
            "${{ inputs.candidate }}" \
            "${{ matrix.baseline }}" \
            | tee arena-result.txt

      - name: Write job summary
        if: always()
        run: |
          {
            echo '```'
            cat arena-result.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload result log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-result-${{ matrix.baseline }}
          path: arena-result.txt

      - name: Upload game records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-records-${{ matrix.baseline }}
          path: arena-records/
          if-no-files-found: ignore
